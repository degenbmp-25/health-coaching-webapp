services:
  postgres:
    image: postgres:15
    container_name: habithletics-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: .Ninjamiki123.
      POSTGRES_DB: habithletics
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: 